<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Stadia Emerald</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('https://api.fontshare.com/v2/css?f[]=satoshi@1,2&display=swap');
        }

        body {
            font-family: 'Satoshi', 'Inter', sans-serif;
            background-color: #0b0f0e;
        }

        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-panel {
            background: rgba(33, 39, 37, 0.7);
            backdrop-filter: blur(24px);
        }

        .primary-gradient {
            background: linear-gradient(135deg, #ddff5c 0%, #caf300 100%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary": "#bbffe3",
                        "primary-fixed-dim": "#bde300",
                        "on-primary-fixed": "#374400",
                        "on-error": "#490006",
                        "error-dim": "#d7383b",
                        "on-tertiary-fixed-variant": "#006850",
                        "on-secondary-fixed": "#00483c",
                        "outline-variant": "#454947",
                        "on-secondary-container": "#a1e1cf",
                        "on-background": "#fafdfa",
                        "error-container": "#9f0519",
                        "on-primary-container": "#485800",
                        "on-surface": "#fafdfa",
                        "on-secondary-fixed-variant": "#266658",
                        "inverse-on-surface": "#525654",
                        "surface-container-high": "#1b211f",
                        "secondary-dim": "#a1e1cf",
                        "on-surface-variant": "#a8acaa",
                        "surface-dim": "#0b0f0e",
                        "tertiary-container": "#45fec9",
                        "inverse-surface": "#f7faf8",
                        "primary-dim": "#bde300",
                        "on-tertiary-container": "#005d47",
                        "secondary-fixed-dim": "#a1e1cf",
                        "secondary": "#afefdd",
                        "surface-tint": "#ddff5c",
                        "outline": "#727675",
                        "surface-container-lowest": "#000000",
                        "surface-container": "#161b19",
                        "tertiary-dim": "#1ee9b6",
                        "tertiary-fixed": "#45fec9",
                        "primary-container": "#caf300",
                        "surface": "#0b0f0e",
                        "on-tertiary": "#00674e",
                        "error": "#ff716c",
                        "surface-variant": "#212725",
                        "surface-container-low": "#101413",
                        "surface-container-highest": "#212725",
                        "on-primary": "#4f6100",
                        "on-primary-fixed-variant": "#516200",
                        "primary": "#ddff5c",
                        "inverse-primary": "#546600",
                        "surface-bright": "#272d2c",
                        "on-secondary": "#195c4e",
                        "background": "#0b0f0e",
                        "on-error-container": "#ffa8a3",
                        "tertiary-fixed-dim": "#2cefbc",
                        "secondary-container": "#0b5345",
                        "on-tertiary-fixed": "#004937",
                        "primary-fixed": "#caf300",
                        "secondary-fixed": "#afefdd"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Satoshi", "Inter"],
                        "label": ["Satoshi", "Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-surface text-on-surface selection:bg-primary selection:text-on-primary min-h-screen flex flex-col">
    <!-- Subtle Architectural Background Element -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container/10 blur-[100px] rounded-full">
        </div>
    </div>
    <!-- Main Navigation Suppression Check: Transactional Page (Login) - Shell is hidden as per "Destination Rule" -->
    <main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-[440px]">
            <!-- Brand Anchor -->
            <div class="mb-12 text-center md:text-left">
                <div class="inline-flex items-center gap-2 mb-8">
                    <div class="w-10 h-10 bg-primary-container rounded flex items-center justify-center">
                        <span class="material-symbols-outlined text-on-primary-container"
                            style="font-variation-settings: 'FILL' 1;">analytics</span>
                    </div>
                    <span class="font-headline text-2xl font-bold tracking-tighter text-primary">Stadia Emerald</span>
                </div>
                <h1
                    class="font-headline text-4xl md:text-5xl font-bold text-on-surface leading-tight tracking-tight mb-3">
                    Precision <br /><span class="text-on-surface-variant">Prediction.</span>
                </h1>
                <p class="text-on-surface-variant font-body text-lg">Enter the arena of institutional-grade insight.</p>
            </div>
            <!-- Login Container -->
            <div class="glass-panel p-8 rounded-xl relative overflow-hidden group">
                <!-- Asymmetric accent -->
                <div
                    class="absolute top-0 right-0 w-1 h-full bg-primary/20 group-hover:bg-primary transition-colors duration-500">
                </div>
                <form class="space-y-6">
                    <!-- Field: Identifier -->
                    <div class="space-y-2">
                        <label class="block text-label-md font-medium text-on-surface-variant ml-1"
                            for="identifier">Email or Mobile</label>
                        <div class="relative">
                            <input
                                class="w-full h-14 bg-surface-container-highest border-none rounded-lg px-5 font-body text-on-surface focus:ring-1 focus:ring-primary/40 transition-all placeholder:text-outline-variant"
                                id="identifier" name="identifier" placeholder="name@domain.com" type="text" />
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">
                                <span class="material-symbols-outlined text-[20px]">alternate_email</span>
                            </div>
                        </div>
                    </div>
                    <!-- Field: Password -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="block text-label-md font-medium text-on-surface-variant"
                                for="password">Password</label>
                            <a class="text-xs font-bold text-primary uppercase tracking-widest hover:text-white transition-colors"
                                href="#">Forgot?</a>
                        </div>
                        <div class="relative">
                            <input
                                class="w-full h-14 bg-surface-container-highest border-none rounded-lg px-5 font-body text-on-surface focus:ring-1 focus:ring-primary/40 transition-all placeholder:text-outline-variant"
                                id="password" name="password" placeholder="••••••••" type="password" />
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">
                                <span class="material-symbols-outlined text-[20px]">lock</span>
                            </div>
                        </div>
                    </div>
                    <!-- Action: Login -->
                    <div class="pt-4">
                        <button
                            class="w-full h-14 primary-gradient text-on-primary font-headline font-bold text-lg rounded-lg shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group"
                            type="submit">
                            Login
                            <span
                                class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
                        </button>
                    </div>
                </form>
                <!-- Footer Context -->
                <div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
                    <p class="text-on-surface-variant font-body">
                        New to the platform?
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4" href="#">Create an
                            account</a>
                    </p>
                </div>
            </div>
            <!-- Footer Compliance/Support Links -->
            <div class="mt-8 flex justify-center gap-6 opacity-40 hover:opacity-100 transition-opacity">
                <a class="text-xs font-medium text-on-surface-variant hover:text-primary uppercase tracking-widest transition-colors"
                    href="#">Terms</a>
                <a class="text-xs font-medium text-on-surface-variant hover:text-primary uppercase tracking-widest transition-colors"
                    href="#">Privacy</a>
                <a class="text-xs font-medium text-on-surface-variant hover:text-primary uppercase tracking-widest transition-colors"
                    href="#">Support</a>
            </div>
        </div>
    </main>
    <!-- Side Decoration (Editorial Visual) - Visible on desktop -->
    <div class="hidden lg:block fixed right-12 top-1/2 -translate-y-1/2 w-72 h-72 pointer-events-none opacity-20">
        <div class="w-full h-full border border-primary/30 rounded-full flex items-center justify-center">
            <div class="w-48 h-48 border border-primary/20 rounded-full flex items-center justify-center">
                <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-4xl"
                        data-weight="fill">verified_user</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
